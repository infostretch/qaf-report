<?xml version="1.0" encoding="UTF-8"?>
<!-- Author: Chirag Jayswal, QAF team -->
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 115 120" role="img" aria-label="Site icon">
  <title>QAF — gray-green palette</title>
  <defs>
    <!-- Diagonal gloss for small tab sizes (keeps shape readable on light/dark chrome) -->
    <linearGradient id="tabShine" x1="0" y1="0" x2="108" y2="118" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="22%" stop-color="#e8f2ec" stop-opacity="0.10"/>
      <stop offset="48%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- S-curve: crush lows (darker ground) + lift highs (bright inner shapes); sage bias on green -->
    <filter id="qafGrayGreen" x="0" y="0" width="100%" height="100%" color-interpolation-filters="sRGB">
      <feColorMatrix in="SourceGraphic" type="matrix" result="tint"
        values="0.20 0.69 0.068 0 -0.02  0.22 0.75 0.074 0 -0.018  0.205 0.70 0.069 0 -0.022  0 0 0 1 0"/>
      <feComponentTransfer in="tint">
        <feFuncR type="table" tableValues="0 0.02 0.06 0.14 0.36 0.60 0.82 0.94 1"/>
        <feFuncG type="table" tableValues="0 0.025 0.08 0.17 0.40 0.64 0.86 0.96 1"/>
        <feFuncB type="table" tableValues="0 0.015 0.05 0.12 0.34 0.58 0.80 0.92 1"/>
        <feFuncA type="identity"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <g>
  <image filter="url(#qafGrayGreen)" href="data:image/png;base64," width="100%" height="100%" preserveAspectRatio="xMidYMid meet"/>
  <rect x="0" y="0" width="115" height="120" fill="url(#tabShine)" pointer-events="none"/>
  </g>
</svg>
